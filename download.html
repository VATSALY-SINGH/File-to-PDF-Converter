<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation Viewer</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fafafa] text-gray-900 min-h-screen flex flex-col font-sans antialiased">
    
    <main class="max-w-5xl w-full mx-auto p-6 md:p-12 flex-grow flex flex-col">
        <!-- Header Section -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Presentation Viewer</h1>
                <p class="text-gray-500 text-sm mt-1">Review the slides below or download the file for offline access.</p>
            </div>
            
            <!-- Download Button -->
            <a href="https://drive.google.com/uc?export=download&id=182fSPk_GmqgW4HJ1gNYO903Xq8zQjDb9" 
               class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-black text-white text-sm font-medium rounded-md hover:bg-gray-800 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
                <i data-lucide="download" class="w-4 h-4"></i>
                Download PPT
            </a>
        </header>

        <!-- Presentation Iframe Container -->
        <div class="relative w-full aspect-video rounded-xl overflow-hidden border border-gray-200 shadow-sm bg-white ring-1 ring-black/[0.04]">
            <!-- Skeleton Loading State -->
            <div class="absolute inset-0 flex items-center justify-center bg-gray-50 -z-10">
                <i data-lucide="loader-2" class="w-6 h-6 text-gray-400 animate-spin"></i>
            </div>
            
            <!-- Google Drive Preview Iframe -->
            <iframe 
                src="https://drive.google.com/file/d/182fSPk_GmqgW4HJ1gNYO903Xq8zQjDb9/preview" 
                frameborder="0" 
                width="100%" 
                height="100%" 
                allowfullscreen="true" 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true"
                class="w-full h-full bg-white z-10 relative"
            ></iframe>
        </div>
    </main>

    <!-- Initialize Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
