<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="7lNfhougJrLrwSI4UZjyNfle2gsdVlMCyVOSy1PJgqA" />
    <title>File to PDF Converter</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="icon.png">

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <!-- RIGHT SIDE : PDF CONVERTER -->
    <div class="container">
        <h1>📄 File to PDF Converter</h1>
        <p>Drag and drop a text file or image here</p>

        <div id="dropArea" class="drop-area">
            <p>📂 Drop Your File Here</p>
            <input type="file" id="fileInput" hidden>
        </div>

        <button id="convertBtn" disabled>Convert to PDF</button>

        <div id="popup" class="popup hidden">
            <div class="popup-content">
                <p id="popupMessage"></p>
                <button onclick="closePopup()">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
